<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="deGoog search settings.">
  <link rel="icon" href="/public/favicon/favicon.ico" type="image/x-icon">
  <title>Settings – deGoog</title>
  <link rel="stylesheet" href="/public/style.css">
</head>
<body class="settings-page-body">
  <div class="settings-page">
    <header class="settings-page-header">
      <a href="/" class="settings-page-back">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back
      </a>
      <h1 class="settings-page-title">Settings</h1>
    </header>

    <main class="settings-page-main">
      <section class="settings-section">
        <h2 class="settings-section-heading">Search Engines</h2>
        <p class="settings-desc">Toggle which engines to query for results.</p>
        <div id="engine-toggles" class="engine-toggles"></div>
      </section>

      <section class="settings-section">
        <h2 class="settings-section-heading">Appearance</h2>
        <p class="settings-desc">Choose your preferred theme.</p>
        <div class="theme-select-wrap">
          <select id="theme-select" class="theme-select">
            <option value="system">System default</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>
      </section>

      <section class="settings-section">
        <h2 class="settings-section-heading">Cache</h2>
        <p class="settings-desc">Clear stored search results.</p>
        <button class="settings-cache-clear" id="settings-cache-clear" type="button">Clear search cache</button>
      </section>

      <div class="settings-page-actions">
        <button class="settings-save" id="settings-save">Save</button>
      </div>
    </main>
  </div>
  <script type="module" src="/public/settings-page.js"></script>
</body>
</html>
